[flake8]
max-line-length = 100
exclude = 
    __pycache__,
    .venv,
    venv,
    .git,
    dist,
    build
ignore = 
    E203,  # whitespace before ':'
    E501,  # line too long (handled by black)
    W503,  # line break before binary operator
per-file-ignores = 
    __init__.py:F401  # imported but unused

[isort]
profile = black
line_length = 100
multi_line_output = 3
include_trailing_comma = True