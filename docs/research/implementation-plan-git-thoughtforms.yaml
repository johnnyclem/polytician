---
title: "Implementation Plan: Git-Based Shareable ThoughtForms"
date: "2026-03-05"
status: Draft
derived_from: ./beads-vs-git-for-thoughtforms.md
architecture: "Hybrid — SQLite working store + Git sync layer"

epics:
  - id: epic-1
    name: Serialization Layer
    description: >
      Establish a deterministic, diff-friendly file format for ThoughtForms
      and build the read/write layer that bridges SQLite and the filesystem.
    depends_on: []
    tasks:
      - id: "1.1"
        title: Define canonical JSON serialization format
        description: >
          Design a normalized JSON schema for .thoughtform.json files: sorted keys,
          2-space indent, one-property-per-line for arrays, stable entity/relationship
          ordering (by ID then predicate). Write a Zod schema for the on-disk format
          that extends ThoughtFormSchema.
        depends_on: []
        new_files:
          - src/sync/schema.ts
        modified_files:
          - src/types/thoughtform.ts

      - id: "1.2"
        title: Implement ThoughtFormSerializer class
        description: >
          Create src/sync/serializer.ts with serialize(concept): string and
          deserialize(json: string): Concept methods. Serialize must produce
          byte-identical output for identical inputs (deterministic). Handle
          round-trip fidelity for all fields including tags, metadata, timestamps.
        depends_on: ["1.1"]
        new_files:
          - src/sync/serializer.ts

      - id: "1.3"
        title: Define filesystem layout convention
        description: >
          Implement path resolution: <syncRoot>/concepts/<namespace>/<id>.thoughtform.json.
          Create src/sync/paths.ts with conceptPath(syncRoot, namespace, id),
          namespacePath(syncRoot, namespace), registryPath(syncRoot). Handle default
          namespace, path sanitization, and OS-safe filenames.
        depends_on: []
        new_files:
          - src/sync/paths.ts

      - id: "1.4"
        title: Build registry index file
        description: >
          Create src/sync/registry.ts that maintains <syncRoot>/registry.json — a
          lightweight index mapping concept IDs to namespace, updated_at timestamp,
          tags, and representation availability (has_markdown, has_thoughtform,
          has_embedding). Registry must be deterministically serialized for clean diffs.
        depends_on: ["1.3"]
        new_files:
          - src/sync/registry.ts

      - id: "1.5"
        title: Implement concept export (SQLite to files)
        description: >
          Create src/sync/exporter.ts with exportConcept(id) and exportAll(namespace?).
          Read from SQLite via DatabaseAdapter, serialize via ThoughtFormSerializer,
          write to filesystem layout. Update registry on each export. Skip embeddings
          (binary; handled separately).
        depends_on: ["1.2", "1.3", "1.4"]
        new_files:
          - src/sync/exporter.ts

      - id: "1.6"
        title: Implement concept import (files to SQLite)
        description: >
          Create src/sync/importer.ts with importConcept(filePath) and
          importAll(syncRoot). Parse .thoughtform.json files, validate with Zod
          schema, upsert into SQLite via ConceptService.save(). Detect new vs
          updated concepts. Report import summary (created/updated/skipped/errored).
        depends_on: ["1.2", "1.4"]
        new_files:
          - src/sync/importer.ts

      - id: "1.7"
        title: Handle embedding exclusion strategy
        description: >
          Create .gitignore rules for embedding binary data. Implement
          src/sync/embedding-manifest.ts that writes a <id>.embedding.meta.json
          sidecar file containing dimension, model name, and content hash — but
          not the vector itself. On import, flag concepts that need re-embedding.
        depends_on: ["1.3"]
        new_files:
          - src/sync/embedding-manifest.ts

      - id: "1.8"
        title: Add export_concepts MCP tool
        description: >
          Register a new export_concepts tool in server.ts that exposes export
          functionality. Parameters: namespace (optional), tag filter (optional),
          output directory (optional, defaults to .polytician/sync). Returns list
          of exported file paths and count.
        depends_on: ["1.5"]
        modified_files:
          - src/server.ts

      - id: "1.9"
        title: Add import_concepts MCP tool
        description: >
          Register a new import_concepts tool in server.ts that exposes import
          functionality. Parameters: source directory, namespace override (optional),
          dry_run flag. Returns import summary with created/updated/skipped/errored
          counts.
        depends_on: ["1.6"]
        modified_files:
          - src/server.ts

      - id: "1.10"
        title: Write serialization round-trip tests
        description: >
          Create tests/sync/serializer.test.ts with tests for: deterministic output,
          round-trip fidelity, edge cases (empty entities, unicode text, null fields,
          large ThoughtForms), and format stability (snapshot tests).
        depends_on: ["1.2"]
        new_files:
          - tests/sync/serializer.test.ts

  - id: epic-2
    name: Git Sync Engine
    description: >
      Build a TypeScript module that wraps simple-git to provide commit, push,
      pull, and status operations scoped to ThoughtForm files.
    depends_on: [epic-1]
    tasks:
      - id: "2.1"
        title: Add simple-git dependency and configure
        description: >
          Add simple-git to package.json. Create src/sync/git-client.ts that
          initializes a SimpleGit instance pointed at the sync root. Detect
          whether sync root is inside an existing git repo or needs git init.
          Handle git availability detection (graceful fallback if git not installed).
        depends_on: []
        new_files:
          - src/sync/git-client.ts
        modified_files:
          - package.json

      - id: "2.2"
        title: Implement GitSyncService core class
        description: >
          Create src/sync/git-sync.service.ts with lifecycle methods:
          initialize(syncRoot), status(), isClean(), currentBranch(). The service
          wraps simple-git and adds ThoughtForm-aware logic. Singleton pattern
          consistent with other services.
        depends_on: ["2.1"]
        new_files:
          - src/sync/git-sync.service.ts

      - id: "2.3"
        title: Implement auto-commit on concept save
        description: >
          Add commit(conceptId, message?) method to GitSyncService. Stage only
          the changed .thoughtform.json file and registry. Generate structured
          commit messages: thoughtform(<namespace>): <verb> <concept-id> where
          verb is create/update/delete. Hook into ConceptService event bus
          (concept.created, concept.updated, concept.deleted).
        depends_on: ["2.2"]

      - id: "2.4"
        title: Implement configurable commit strategies
        description: >
          Create src/sync/commit-strategy.ts with three modes: (a) immediate —
          commit on every save, (b) batched — collect changes and commit on
          explicit flush or timer, (c) manual — only commit when user triggers.
          Add POLYTICIAN_GIT_COMMIT_STRATEGY config option.
        depends_on: ["2.3"]
        new_files:
          - src/sync/commit-strategy.ts
        modified_files:
          - src/config.ts

      - id: "2.5"
        title: Implement push/pull operations
        description: >
          Add push(remote?, branch?) and pull(remote?, branch?) to GitSyncService.
          After pull, detect changed .thoughtform.json files via git diff and
          trigger selective import for only changed concepts. Handle authentication
          passthrough (SSH agent, credential helpers).
        depends_on: ["2.2"]

      - id: "2.6"
        title: Implement conflict detection on pull
        description: >
          After git pull, check for merge conflicts in .thoughtform.json files.
          Create src/sync/conflict-detector.ts that parses git status for
          conflicted paths, extracts ours/theirs/base versions using git show,
          and returns structured conflict objects: { conceptId, base, ours, theirs }.
        depends_on: ["2.5"]
        new_files:
          - src/sync/conflict-detector.ts

      - id: "2.7"
        title: Add sync_push and sync_pull MCP tools
        description: >
          Register MCP tools: sync_push (export changed concepts + commit + push)
          and sync_pull (pull + import changed concepts). Parameters: remote name,
          branch, commit message override. Return summary of synced concepts and
          any conflicts.
        depends_on: ["2.5"]
        modified_files:
          - src/server.ts

      - id: "2.8"
        title: Add sync_status MCP tool
        description: >
          Register MCP tool that returns: current branch, remote tracking info,
          uncommitted ThoughtForm changes (new/modified/deleted), unpushed commits
          count, last sync timestamp. Combine git status, git log, and registry diff.
        depends_on: ["2.2"]
        modified_files:
          - src/server.ts

      - id: "2.9"
        title: Implement sync root initialization
        description: >
          Create src/sync/init.ts with initSyncRoot(path, options). Options:
          standalone (new git repo), embedded (subdirectory of existing repo),
          stealth (gitignored local-only, inspired by Beads). Write .polytician.yaml
          config file with sync settings. Add init_sync MCP tool.
        depends_on: ["2.1"]
        new_files:
          - src/sync/init.ts
        modified_files:
          - src/server.ts

      - id: "2.10"
        title: Write git sync integration tests
        description: >
          Create tests/sync/git-sync.test.ts using temporary git repos. Test:
          init, commit, push/pull between two repos, conflict detection,
          auto-commit on save, batched commits, status reporting. Use simple-git
          to set up test fixtures.
        depends_on: ["2.2", "2.3", "2.4", "2.5", "2.6"]
        new_files:
          - tests/sync/git-sync.test.ts

  - id: epic-3
    name: Custom Merge Driver
    description: >
      Build a git merge driver that understands ThoughtForm structure and
      performs field-level three-way merge instead of line-level text merge.
    depends_on: [epic-1]
    tasks:
      - id: "3.1"
        title: Design three-way merge algorithm for ThoughtForms
        description: >
          Document the merge strategy for each ThoughtForm component:
          (a) metadata — last-writer-wins for scalar fields, set-union for tags,
          (b) entities — merge by entity ID, detect add/remove/modify,
          (c) relationships — merge by (subject, predicate, object) key,
          (d) contextGraph — regenerate from merged relationships.
          Write decision table for conflict cases.
        depends_on: []

      - id: "3.2"
        title: Implement ThoughtFormMerger class
        description: >
          Create src/sync/merger.ts with merge(base, ours, theirs): MergeResult.
          MergeResult contains merged ThoughtForm + list of conflicts (if any).
          Each conflict identifies the component (entity/relationship/metadata),
          the field, and the three values.
        depends_on: ["3.1"]
        new_files:
          - src/sync/merger.ts

      - id: "3.3"
        title: Implement entity-level merge
        description: >
          Within ThoughtFormMerger, add mergeEntities(base, ours, theirs). Match
          entities by ID. Handle: both sides add same entity (identical = auto-merge,
          different = conflict), one side deletes while other modifies (conflict),
          both modify same entity field (conflict on that field, auto-merge others).
        depends_on: ["3.2"]

      - id: "3.4"
        title: Implement relationship-level merge
        description: >
          Within ThoughtFormMerger, add mergeRelationships(base, ours, theirs).
          Key relationships by (subjectId, predicate, objectId) tuple. Handle:
          new relationships from both sides (union), deleted relationships (remove
          if either side deleted and other didn't modify), confidence changes
          (last-writer-wins or average).
        depends_on: ["3.2"]

      - id: "3.5"
        title: Implement context graph regeneration
        description: >
          After merging entities and relationships, regenerate contextGraph from
          the merged relationship set. Create src/sync/graph-builder.ts with
          buildContextGraph(entities, relationships): Record<string, string[]>.
          This avoids merging the graph directly (which is a derived structure).
        depends_on: ["3.3", "3.4"]
        new_files:
          - src/sync/graph-builder.ts

      - id: "3.6"
        title: Build git merge driver executable
        description: >
          Create src/sync/merge-driver.ts as a CLI entry point that git calls
          during merge. Reads %O (base), %A (ours), %B (theirs) file paths from
          argv. Runs ThoughtFormMerger, writes result to %A. Exit 0 on clean merge,
          exit 1 on conflicts (writing conflict markers as structured JSON comments).
          Add to package.json bin field.
        depends_on: ["3.2"]
        new_files:
          - src/sync/merge-driver.ts
        modified_files:
          - package.json

      - id: "3.7"
        title: Generate .gitattributes configuration
        description: >
          In initSyncRoot(), write .gitattributes with:
          *.thoughtform.json merge=thoughtform-merge. Provide setup instructions
          or auto-configure via git config merge.thoughtform-merge.driver
          "npx polytician-merge %O %A %B".
        depends_on: ["3.6"]

      - id: "3.8"
        title: Implement conflict resolution UI helpers
        description: >
          Create src/sync/conflict-resolver.ts with resolution strategies:
          acceptOurs(conflict), acceptTheirs(conflict), acceptBoth(conflict)
          (for additive changes), manual(conflict, resolution). Add resolve_conflict
          MCP tool that accepts concept ID + resolution strategy per conflicted
          component.
        depends_on: ["3.2"]
        new_files:
          - src/sync/conflict-resolver.ts
        modified_files:
          - src/server.ts

      - id: "3.9"
        title: Handle partial merge with conflict report
        description: >
          When merge produces conflicts, write the clean-merged portions to the
          output file and append a _conflicts sidecar file
          (<id>.thoughtform.conflicts.json) listing unresolved conflicts with
          base/ours/theirs values. The sync_status tool should surface these.
        depends_on: ["3.6", "3.8"]

      - id: "3.10"
        title: Write merge driver unit and integration tests
        description: >
          Create tests/sync/merger.test.ts with cases: clean merge (no conflicts),
          entity add/add (same), entity add/add (different), entity modify/delete,
          relationship add from both sides, tag set union, metadata timestamp
          conflict, full integration test simulating git merge with custom driver.
        depends_on: ["3.2", "3.3", "3.4", "3.5", "3.6"]
        new_files:
          - tests/sync/merger.test.ts

  - id: epic-4
    name: Collaboration Primitives
    description: >
      Build the workflows that let users fork, branch, share, and contribute
      ThoughtForms using familiar git collaboration patterns.
    depends_on: [epic-2, epic-3]
    tasks:
      - id: "4.1"
        title: Implement branch management for ThoughtForms
        description: >
          Add createBranch(name), switchBranch(name), listBranches(),
          deleteBranch(name) to GitSyncService. On branch switch, re-import all
          ThoughtForms from the new branch's files into SQLite (or maintain
          branch-indexed SQLite state). Handle dirty state warnings.
        depends_on: []

      - id: "4.2"
        title: Implement fork detection and upstream tracking
        description: >
          Create src/sync/remote-manager.ts with addRemote(name, url),
          listRemotes(), setUpstream(branch, remote). Detect fork relationship
          by checking if remote URL differs from origin. Track upstream/downstream
          for sync_status reporting.
        depends_on: []
        new_files:
          - src/sync/remote-manager.ts

      - id: "4.3"
        title: Build fork_concepts MCP tool
        description: >
          Create a tool that: (a) creates a new git branch, (b) optionally filters
          to a subset of concepts by namespace/tags, (c) copies selected concepts
          to the new branch, (d) sets up tracking. This enables "fork this knowledge
          domain" workflows where an agent branches a subset of concepts to evolve
          independently.
        depends_on: ["4.1"]
        modified_files:
          - src/server.ts

      - id: "4.4"
        title: Build share_concepts MCP tool
        description: >
          Create a tool that packages selected concepts for sharing: (a) export to
          normalized JSON, (b) commit with descriptive message, (c) push to
          specified remote/branch. Parameters: concept IDs or tag/namespace filter,
          remote, branch, commit message. Returns push result + shareable URL if
          GitHub remote detected.
        depends_on: []
        modified_files:
          - src/server.ts

      - id: "4.5"
        title: Implement pull request description generator
        description: >
          Create src/sync/pr-generator.ts that analyzes ThoughtForm diffs between
          branches and generates a structured PR description: summary of concepts
          added/modified/deleted, entity count changes, new relationships, tag
          changes. Output as markdown suitable for GitHub PR body.
        depends_on: []
        new_files:
          - src/sync/pr-generator.ts

      - id: "4.6"
        title: Build merge_branch MCP tool
        description: >
          Create a tool that merges a source branch into the current branch for
          ThoughtForm files. Uses the custom merge driver (Epic 3). Reports clean
          merges, auto-resolved merges, and conflicts requiring manual resolution.
          Optionally auto-commit on clean merge.
        depends_on: ["4.1"]
        modified_files:
          - src/server.ts

      - id: "4.7"
        title: Implement rebase support for ThoughtForm branches
        description: >
          Add rebaseBranch(onto) to GitSyncService. Rebase replays ThoughtForm
          commits from the current branch onto the target. After rebase, re-import
          to sync SQLite with the rebased file state. Handle rebase conflicts by
          surfacing them through the conflict resolution flow (Epic 3).
        depends_on: ["4.1"]

      - id: "4.8"
        title: Build contributor mode (inspired by Beads)
        description: >
          Implement --contributor mode from initSyncRoot(): route ThoughtForm files
          to a separate directory (e.g., ~/.polytician/contributions/<project>/)
          instead of the main repo. This keeps experimental concepts out of PRs
          until explicitly promoted. Add promote_concepts tool to move from
          contributor space to main repo.
        depends_on: []
        new_files:
          - src/sync/contributor-mode.ts
        modified_files:
          - src/server.ts

      - id: "4.9"
        title: Build stealth mode (inspired by Beads)
        description: >
          Implement --stealth mode: ThoughtForm sync files are written to a
          gitignored directory within the repo (.polytician/local/). Concepts are
          versioned locally via git but never pushed. Useful for personal knowledge
          on shared projects. Add mode switching: stealth to tracked promotion.
        depends_on: []
        new_files:
          - src/sync/stealth-mode.ts

      - id: "4.10"
        title: Write collaboration workflow integration tests
        description: >
          Create tests/sync/collaboration.test.ts simulating multi-user workflows:
          (a) user A creates concepts, pushes; user B pulls, modifies, pushes;
          user A pulls and merges, (b) fork + diverge + PR merge, (c) rebase
          workflow, (d) contributor mode promote flow. Use temp git repos with
          multiple clones.
        depends_on: ["4.1", "4.2", "4.3", "4.4", "4.5", "4.6", "4.7", "4.8", "4.9"]
        new_files:
          - tests/sync/collaboration.test.ts

  - id: epic-5
    name: Agent-Optimized Features
    description: >
      Build features specifically designed for AI agent workflows, inspired by
      Beads' innovations around context management, readiness detection, and
      multi-agent coordination.
    depends_on: [epic-1, epic-2, epic-3, epic-4]
    tasks:
      - id: "5.1"
        title: Implement semantic memory compaction
        description: >
          Create src/sync/compaction.ts with compactConcept(id) that uses the LLM
          provider to summarize old/low-activity ThoughtForms into condensed versions.
          Preserve entity IDs and key relationships but reduce rawText and collapse
          low-confidence entities. Store compaction metadata (original size,
          compacted size, compaction date). Add POLYTICIAN_COMPACTION_THRESHOLD_DAYS
          config.
        depends_on: []
        new_files:
          - src/sync/compaction.ts
        modified_files:
          - src/config.ts

      - id: "5.2"
        title: Build compaction scheduling and triggers
        description: >
          Create src/sync/compaction-scheduler.ts that identifies compaction
          candidates: concepts not updated in N days, concepts with low search
          hit counts, concepts exceeding a size threshold. Run on a configurable
          interval or on-demand via compact_concepts MCP tool. Respect a
          never_compact tag.
        depends_on: ["5.1"]
        new_files:
          - src/sync/compaction-scheduler.ts
        modified_files:
          - src/server.ts

      - id: "5.3"
        title: Implement concept readiness detection
        description: >
          Create src/sync/readiness.ts with assessReadiness(id): ReadinessReport.
          A concept is "ready" (for sharing/review) when: (a) it has all three
          representations (markdown + thoughtform + embedding), (b) entity
          confidence scores are above threshold, (c) no unresolved conflicts,
          (d) no draft tag. Add list_ready_concepts MCP tool that surfaces
          share-ready concepts.
        depends_on: []
        new_files:
          - src/sync/readiness.ts
        modified_files:
          - src/server.ts

      - id: "5.4"
        title: Add supersedes and duplicates relationship types
        description: >
          Extend the ThoughtForm relationship predicates (inspired by Beads' link
          types) to include supersedes (this concept replaces an older one) and
          duplicates (this concept overlaps with another). Add link_concepts MCP
          tool for creating these meta-relationships. Update search to optionally
          follow/exclude superseded concepts.
        depends_on: []
        modified_files:
          - src/types/thoughtform.ts
          - src/services/concept.service.ts
          - src/server.ts

      - id: "5.5"
        title: Implement concept lineage tracking
        description: >
          Create src/sync/lineage.ts that tracks concept provenance through git
          history. getLineage(id) returns: creation commit, all modification
          commits, which branches it exists on, fork/merge points, authors.
          Uses git log -- <file> for file-level history. Add concept_history
          MCP tool.
        depends_on: []
        new_files:
          - src/sync/lineage.ts
        modified_files:
          - src/server.ts

      - id: "5.6"
        title: Build multi-agent coordination layer
        description: >
          Create src/sync/agent-coordinator.ts that manages multi-agent workflows:
          (a) agent identity registration (agent ID to namespace mapping),
          (b) concept locking (advisory, via lock files in git),
          (c) work-in-progress signaling (WIP tags),
          (d) handoff protocol (agent A marks concepts for agent B's namespace).
          Add register_agent and handoff_concepts MCP tools.
        depends_on: []
        new_files:
          - src/sync/agent-coordinator.ts
        modified_files:
          - src/server.ts

      - id: "5.7"
        title: Implement context budget advisor
        description: >
          Create src/sync/context-advisor.ts with adviseForContext(budgetTokens,
          query?). Given a token budget, return the optimal set of concepts to
          include in an agent's context: prioritize by relevance (vector similarity
          to query), recency, readiness, and relationship density. Use compacted
          versions for older concepts. Add get_context_pack MCP tool.
        depends_on: ["5.1", "5.3"]
        new_files:
          - src/sync/context-advisor.ts
        modified_files:
          - src/server.ts

      - id: "5.8"
        title: Build change digest for agent catch-up
        description: >
          Create src/sync/digest.ts with generateDigest(since: Date | commitHash).
          Produces a structured summary of all ThoughtForm changes since a point
          in time: new concepts, modified concepts (with diff summaries), deleted
          concepts, new relationships, conflict resolutions. Designed for agents
          resuming work after a gap. Add get_change_digest MCP tool.
        depends_on: []
        new_files:
          - src/sync/digest.ts
        modified_files:
          - src/server.ts

      - id: "5.9"
        title: Implement concept dependency graph
        description: >
          Create src/sync/dependency-graph.ts that builds a DAG from ThoughtForm
          relationships. getBlockers(id) returns concepts that must be finalized
          before this one (based on relationship predicates). getReadyQueue()
          returns concepts with no open blockers (inspired by Beads bd ready).
          Useful for agents planning knowledge-building sequences. Add
          concept_dependencies MCP tool.
        depends_on: ["5.4"]
        new_files:
          - src/sync/dependency-graph.ts
        modified_files:
          - src/server.ts

      - id: "5.10"
        title: Write agent workflow integration tests
        description: >
          Create tests/sync/agent-features.test.ts testing: compaction round-trip
          (original to compacted to still searchable), readiness assessment,
          lineage tracking through branches, multi-agent lock/handoff, context
          budget optimization, change digest accuracy, dependency graph ordering.
        depends_on: ["5.1", "5.2", "5.3", "5.4", "5.5", "5.6", "5.7", "5.8", "5.9"]
        new_files:
          - tests/sync/agent-features.test.ts

dependency_graph:
  description: >
    Epics are sequential at the macro level, but tasks within each epic
    can be parallelized along the dependency chains shown in each task.
  flow:
    - from: epic-1
      to: epic-2
    - from: epic-1
      to: epic-3
    - from: epic-2
      to: epic-4
    - from: epic-3
      to: epic-4
    - from: epic-4
      to: epic-5

success_criteria:
  shareable: >
    Two separate Polytician instances can push/pull ThoughtForms via git
    remotes with zero data loss.
  mergeable: >
    Concurrent edits to different entities within the same ThoughtForm
    auto-merge cleanly; conflicting edits surface structured conflict objects.
  rebaseable: >
    A branch of ThoughtForm changes can be rebased onto an updated main
    branch with the custom merge driver handling conflicts.
  forkable: >
    A user can fork a concept namespace, evolve it independently, and
    submit changes back via PR with a generated description.

scope_summary:
  total_tasks: 50
  total_epics: 5
  new_typescript_modules: ~20 in src/sync/
  new_mcp_tools: ~15
  new_test_files: ~5 in tests/sync/
  new_dependencies:
    - simple-git
  infrastructure_requirements: "None — git is the only external dependency"
