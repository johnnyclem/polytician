# =============================================================================
# Politician MCP Server - Production Docker Compose Configuration
# =============================================================================
# This configuration provides enhanced security for production deployments
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
# =============================================================================

version: '3.8'

services:
  politician:
    build:
      context: .
      dockerfile: Dockerfile
      target: production  # Use production target if defined in Dockerfile
    container_name: politician-mcp-prod
    restart: unless-stopped
    
    # Environment variables (production)
    environment:
      - NODE_ENV=production
      - SIDECAR_HOST=127.0.0.1
      - SIDECAR_PORT=8787
      - DB_PATH=/app/data/concepts.db
      - LOG_LEVEL=warn  # More restrictive logging
      - MAX_REQUEST_SIZE=1mb
      - ENABLE_METRICS=true
    
    # Persistent storage with restricted permissions
    volumes:
      - politician-data:/app/data:rw
      - politician-logs:/app/logs:rw
    
    # NO port mappings - completely internal
    # MCP server uses stdio, sidecar only accessible internally
    
    # Enhanced health check
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8787/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Security and resource limits
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    
    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true  # Read-only filesystem except for mounted volumes
    tmpfs:
      - /tmp:noexec,nosuid,size=100m  # Secure tmp filesystem
    
    # User configuration (non-root)
    user: "1000:1000"  # Run as non-root user
    
    # Logging configuration with rotation
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "production=politician"

  # Optional: Monitoring service (uncomment if needed)
  # monitoring:
  #   image: prom/prometheus:latest
  #   container_name: politician-monitoring
  #   restart: unless-stopped
  #   ports:
  #     - "9090:9090"  # Prometheus UI
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'

# Named volumes for data persistence with backup labels
volumes:
  politician-data:
    driver: local
    labels:
      - "backup=daily"
      - "retention=30d"
  politician-logs:
    driver: local
    labels:
      - "backup=daily"
      - "retention=7d"

# Network configuration (isolated)
networks:
  default:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: politician-net
      com.docker.network.bridge.enable_icc: "false"  # Disable inter-container communication
      com.docker.network.bridge.enable_ip_masquerade: "true"