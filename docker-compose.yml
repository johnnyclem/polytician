version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: polytician
      POSTGRES_USER: polytician
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polytician"]
      interval: 5s
      timeout: 3s
      retries: 5

  polytician-1:
    build: .
    environment:
      POLYTICIAN_DB_BACKEND: postgres
      POLYTICIAN_POSTGRES_URL: postgresql://polytician:${POSTGRES_PASSWORD:-changeme}@postgres:5432/polytician
      POLYTICIAN_HEALTH_PORT: "8787"
      POLYTICIAN_SIDECAR_URL: http://sidecar:5001
      POLYTICIAN_NODE_ID: node-1
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy
      sidecar:
        condition: service_healthy

  polytician-2:
    build: .
    environment:
      POLYTICIAN_DB_BACKEND: postgres
      POLYTICIAN_POSTGRES_URL: postgresql://polytician:${POSTGRES_PASSWORD:-changeme}@postgres:5432/polytician
      POLYTICIAN_HEALTH_PORT: "8788"
      POLYTICIAN_SIDECAR_URL: http://sidecar:5001
      POLYTICIAN_NODE_ID: node-2
    ports:
      - "8788:8788"
    depends_on:
      postgres:
        condition: service_healthy
      sidecar:
        condition: service_healthy

  sidecar:
    build: ./python-sidecar
    environment:
      SIDECAR_PORT: "5001"
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
